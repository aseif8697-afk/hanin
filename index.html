<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎂 Happy Birthday Hanin</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #0a0a1a;
            overflow: hidden;
            position: relative;
        }

        #bgCanvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
        }

        .container {
            position: relative;
            z-index: 10;
            width: 95%;
            max-width: 950px;
            background: rgba(255, 255, 255, 0.06);
            backdrop-filter: blur(16px);
            border-radius: 50px;
            padding: 35px 30px;
            box-shadow: 0 30px 80px rgba(255, 105, 180, 0.4), inset 0 0 80px rgba(255, 105, 180, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            text-align: center;
            max-height: 95vh;
            overflow-y: auto;
        }

        .container::-webkit-scrollbar {
            width: 6px;
        }
        .container::-webkit-scrollbar-thumb {
            background: #ff69b4;
            border-radius: 10px;
        }

        #loginScreen {
            display: block;
        }

        #loginScreen h1 {
            color: #fff;
            font-size: 2.8rem;
            margin-bottom: 10px;
            text-shadow: 0 0 40px #ff69b4, 0 0 80px #ff1493;
        }

        #loginScreen .sub {
            color: #ffb6c1;
            font-size: 1.2rem;
            margin-bottom: 25px;
        }

        #loginScreen input {
            padding: 16px 25px;
            border-radius: 60px;
            border: 2px solid #ff69b480;
            outline: none;
            width: 80%;
            max-width: 400px;
            font-size: 1.2rem;
            text-align: center;
            background: rgba(255, 255, 255, 0.08);
            color: #fff;
            backdrop-filter: blur(4px);
            transition: 0.3s;
        }

        #loginScreen input:focus {
            border-color: #ff69b4;
            box-shadow: 0 0 30px #ff69b460;
        }

        #loginScreen input::placeholder {
            color: #aaa;
        }

        #loginScreen button {
            margin-top: 20px;
            padding: 14px 50px;
            border: none;
            border-radius: 60px;
            background: linear-gradient(135deg, #ff69b4, #ff1493);
            color: #fff;
            font-size: 1.3rem;
            font-weight: bold;
            cursor: pointer;
            transition: 0.4s;
            box-shadow: 0 0 40px #ff149380;
            letter-spacing: 2px;
        }

        #loginScreen button:hover {
            transform: scale(1.08);
            box-shadow: 0 0 70px #ff1493;
        }

        #loginError {
            color: #ff6b6b;
            margin-top: 15px;
            font-weight: bold;
            display: none;
            font-size: 1.1rem;
        }

        #mainContent {
            display: none;
            animation: fadeInUp 1s ease;
        }

        @keyframes fadeInUp {
            0% {
                opacity: 0;
                transform: translateY(40px) scale(0.95);
            }
            100% {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        #mainContent .title {
            font-size: 2.8rem;
            background: linear-gradient(45deg, #ff69b4, #ffd700, #ff69b4);
            background-size: 300% 300%;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: gradientMove 3s ease infinite;
            font-weight: 900;
        }

        @keyframes gradientMove {
            0% {
                background-position: 0% 50%;
            }
            50% {
                background-position: 100% 50%;
            }
            100% {
                background-position: 0% 50%;
            }
        }

        .image-circle {
            display: flex;
            justify-content: center;
            gap: 15px;
            flex-wrap: wrap;
            margin: 15px 0;
        }

        .image-circle img {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            border: 3px solid #ff69b4;
            object-fit: cover;
            transition: 0.4s;
            animation: floatImage 3s ease-in-out infinite;
            box-shadow: 0 0 30px #ff69b460;
        }

        .image-circle img:nth-child(2) {
            animation-delay: 0.5s;
        }
        .image-circle img:nth-child(3) {
            animation-delay: 1s;
        }
        .image-circle img:nth-child(4) {
            animation-delay: 1.5s;
        }

        @keyframes floatImage {
            0%,
            100% {
                transform: translateY(0) rotate(0deg);
            }
            50% {
                transform: translateY(-15px) rotate(5deg);
            }
        }

        .image-circle img:hover {
            transform: scale(1.3) rotate(10deg);
        }

        #typewriter {
            font-size: 1.6rem;
            color: #ffe6f0;
            min-height: 150px;
            padding: 20px;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 25px;
            border-right: 4px solid #ff69b4;
            margin: 20px 0;
            text-align: right;
            line-height: 2.2;
            white-space: pre-wrap;
            box-shadow: inset 0 0 50px rgba(255, 105, 180, 0.05);
        }

        /* العدادين جنب بعض */
        .counters-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 18px;
            margin: 15px 0;
        }

        .counter-box {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 25px;
            padding: 20px 15px;
            border: 1px solid rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(4px);
            transition: 0.3s;
        }

        .counter-box:hover {
            border-color: #ff69b460;
            box-shadow: 0 0 30px #ff69b420;
        }

        .counter-box .label {
            color: #ffb6c1;
            font-size: 0.95rem;
            letter-spacing: 1px;
            margin-bottom: 8px;
        }

        .counter-box .value {
            font-size: 2.5rem;
            font-weight: bold;
            color: #ffd700;
            text-shadow: 0 0 30px #ffd70060;
        }

        .counter-box .value span {
            font-size: 1rem;
            color: #fff;
        }

        .counter-box .sub-value {
            font-size: 1.1rem;
            color: #ffb6c1;
            margin-top: 5px;
        }

        /* العداد التنازلي التفصيلي */
        .countdown-details {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
            margin: 15px 0;
        }

        .cd-item {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 20px;
            padding: 12px 5px;
            border: 1px solid rgba(255, 215, 0, 0.15);
        }

        .cd-item .num {
            font-size: 2rem;
            font-weight: bold;
            color: #ffd700;
        }

        .cd-item .lbl {
            font-size: 0.7rem;
            color: #aaa;
            display: block;
        }

        #controlPanel {
            margin-top: 25px;
            background: rgba(0, 0, 0, 0.6);
            border-radius: 30px;
            padding: 25px;
            border: 1px solid #ff69b460;
            display: none;
            text-align: right;
            backdrop-filter: blur(8px);
        }

        #controlPanel h3 {
            color: #ffb6c1;
            font-size: 1.5rem;
            margin-bottom: 15px;
            text-align: center;
        }

        #controlPanel label {
            color: #ffb6c1;
            font-weight: bold;
            display: block;
            margin-top: 15px;
            font-size: 0.95rem;
        }

        #controlPanel input,
        #controlPanel textarea {
            width: 100%;
            padding: 12px 16px;
            margin: 6px 0;
            border-radius: 16px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            background: rgba(255, 255, 255, 0.06);
            color: #fff;
            font-size: 1rem;
            resize: vertical;
            transition: 0.3s;
        }

        #controlPanel input:focus,
        #controlPanel textarea:focus {
            border-color: #ff69b4;
            box-shadow: 0 0 20px #ff69b430;
        }

        #controlPanel textarea {
            min-height: 80px;
        }

        .ctrl-btn {
            background: linear-gradient(135deg, #00b894, #00a381);
            color: #fff;
            border: none;
            padding: 12px 30px;
            border-radius: 50px;
            font-weight: bold;
            cursor: pointer;
            margin: 5px 5px 5px 0;
            transition: 0.3s;
            font-size: 1rem;
        }

        .ctrl-btn:hover {
            transform: scale(1.04);
            box-shadow: 0 0 30px #00b89480;
        }

        .ctrl-btn.danger {
            background: linear-gradient(135deg, #e17055, #d63031);
        }

        .ctrl-btn.pink {
            background: linear-gradient(135deg, #fd79a8, #e84393);
        }

        #togglePanelBtn {
            background: linear-gradient(135deg, #6c5ce7, #a29bfe);
            border: none;
            padding: 10px 30px;
            border-radius: 50px;
            color: #fff;
            font-weight: bold;
            cursor: pointer;
            margin: 10px 0;
            transition: 0.3s;
            font-size: 1rem;
        }

        #togglePanelBtn:hover {
            transform: scale(1.05);
            box-shadow: 0 0 30px #6c5ce780;
        }

        #signature {
            margin-top: 25px;
            color: #888;
            font-size: 0.9rem;
            border-top: 1px solid #ffffff15;
            padding-top: 18px;
            letter-spacing: 0.5px;
        }

        #signature span {
            color: #ff69b4;
            font-weight: bold;
        }

        .emoji-row {
            font-size: 2.5rem;
            letter-spacing: 10px;
            margin: 10px 0;
            animation: emojiPulse 2s ease-in-out infinite;
        }

        @keyframes emojiPulse {
            0%,
            100% {
                transform: scale(1);
            }
            50% {
                transform: scale(1.1);
            }
        }

        @media (max-width: 700px) {
            .counters-grid {
                grid-template-columns: 1fr;
            }
            .countdown-details {
                grid-template-columns: repeat(2, 1fr);
            }
            #typewriter {
                font-size: 1.2rem;
            }
            #mainContent .title {
                font-size: 2rem;
            }
            .container {
                padding: 20px 15px;
            }
            .image-circle img {
                width: 60px;
                height: 60px;
            }
        }

        @media (max-width: 450px) {
            #loginScreen h1 {
                font-size: 1.8rem;
            }
            #loginScreen input {
                width: 95%;
                font-size: 1rem;
            }
            .cd-item .num {
                font-size: 1.5rem;
            }
            .counter-box .value {
                font-size: 1.8rem;
            }
        }
    </style>
</head>
<body>

    <canvas id="bgCanvas"></canvas>

    <div class="container">

        <!-- شاشة الدخول -->
        <div id="loginScreen">
            <h1>🎂 Happy Birthday</h1>
            <p class="sub">✨ أدخلي تاريخ ميلادكِ ✨</p>
            <input type="password" id="passInput" placeholder="17/7/2008" />
            <br>
            <button onclick="checkPassword()">🔓 افتحي المفاجأة</button>
            <div id="loginError">❌ الباسورد غلط يا حنين! ❌</div>
        </div>

        <!-- المحتوى الرئيسي -->
        <div id="mainContent">

            <div class="title">🎉 كل سنة وانتِ معانا يا حنين 🎉</div>

            <div class="image-circle">
                <img src="https://img.icons8.com/fluency/96/000000/cake.png" alt="كيكة">
                <img src="https://img.icons8.com/fluency/96/000000/balloon.png" alt="بالون">
                <img src="https://img.icons8.com/fluency/96/000000/gift.png" alt="هدية">
                <img src="https://img.icons8.com/fluency/96/000000/party.png" alt="حفلة">
            </div>

            <div id="typewriter"></div>

            <!-- عدادان جنب بعض -->
            <div class="counters-grid">
                <!-- عمرها -->
                <div class="counter-box">
                    <div class="label">🎂 عمر حنين</div>
                    <div class="value" id="ageDisplay">-- سنة</div>
                    <div class="sub-value" id="ageDetail">-- شهر -- يوم</div>
                </div>
                <!-- العداد التنازلي لعيد الميلاد القادم -->
                <div class="counter-box">
                    <div class="label">⏳ باقي على عيد ميلادها</div>
                    <div class="value" id="daysLeft">--</div>
                    <div class="sub-value" id="countdownDetail">-- ساعة -- دقيقة -- ثانية</div>
                </div>
            </div>

            <!-- تفاصيل العداد التنازلي -->
            <div class="countdown-details">
                <div class="cd-item">
                    <div class="num" id="cdDays">--</div>
                    <span class="lbl">يوم</span>
                </div>
                <div class="cd-item">
                    <div class="num" id="cdHours">--</div>
                    <span class="lbl">ساعة</span>
                </div>
                <div class="cd-item">
                    <div class="num" id="cdMinutes">--</div>
                    <span class="lbl">دقيقة</span>
                </div>
                <div class="cd-item">
                    <div class="num" id="cdSeconds">--</div>
                    <span class="lbl">ثانية</span>
                </div>
            </div>

            <div class="emoji-row">🥳🎈🎁🎀✨💖</div>

            <button id="togglePanelBtn" onclick="togglePanel()">🛠️ لوحة التحكم</button>

            <div id="controlPanel">
                <h3>⚙️ تحكم في الموقع</h3>

                <label>📝 تعديل النص</label>
                <textarea id="editText">كل سنة يا اجمل حنو عرفتها اختي وامي وصحبتي الي بحبها كل سنة وانتي معانا وبتكبري قدامي يا وزتي عارف ان الهديه مش قد كد بس يلا اهو اي حاجه وكل سنة وانتي معانا يا اجمل حنين في الكون</textarea>
                <button class="ctrl-btn" onclick="updateText()">✅ تأكيد تغيير النص</button>

                <label>🖼️ رابط صورة الخلفية</label>
                <input type="text" id="bgImageUrl" placeholder="ضع رابط صورة هنا" />
                <button class="ctrl-btn" onclick="updateBgImage()">✅ تأكيد تغيير الخلفية</button>

                <label>🎵 رفع أغنية (MP3)</label>
                <input type="file" id="songFile" accept="audio/*" />
                <button class="ctrl-btn" onclick="uploadSong()">✅ رفع الأغنية</button>

                <label>🔑 تغيير الباسورد (حالي: 17/7/2008)</label>
                <input type="text" id="newPassword" placeholder="باسورد جديد" />
                <button class="ctrl-btn" onclick="changePassword()">✅ تغيير الباسورد</button>

                <hr style="border-color:#ff69b460; margin:15px 0;">

                <button class="ctrl-btn danger" onclick="resetAll()">🔄 إعادة ضبط كل شيء</button>
            </div>

            <div id="signature">
                ✨ مصنوع من <span>❤️ مرعب</span> مقدم لي <span>حنين</span> ✨
            </div>

            <audio id="bgMusic" loop></audio>
        </div>
    </div>

    <script>
        // =============================================
        // 1. الخلفية المتحركة (نجوم + بالونات + ألعاب نارية)
        // =============================================
        const canvas = document.getElementById('bgCanvas');
        const ctx = canvas.getContext('2d');
        let W, H;

        function resizeCanvas() {
            W = canvas.width = window.innerWidth;
            H = canvas.height = window.innerHeight;
        }
        resizeCanvas();
        window.addEventListener('resize', resizeCanvas);

        const stars = [];
        for (let i = 0; i < 150; i++) {
            stars.push({
                x: Math.random() * W,
                y: Math.random() * H,
                r: Math.random() * 2 + 0.5,
                d: Math.random() * 0.5 + 0.3,
                speed: Math.random() * 0.02 + 0.005
            });
        }

        const balloons = [];
        for (let i = 0; i < 10; i++) {
            balloons.push({
                x: Math.random() * W,
                y: Math.random() * H,
                r: 20 + Math.random() * 35,
                speed: 0.3 + Math.random() * 0.6,
                color: `hsl(${Math.random()*360}, 80%, 60%)`,
                phase: Math.random() * 6.28
            });
        }

        let particles = [];

        function createFirework() {
            const cx = Math.random() * W * 0.6 + W * 0.2;
            const cy = Math.random() * H * 0.4 + H * 0.1;
            const count = 40 + Math.floor(Math.random() * 40);
            const hue = Math.random() * 360;
            for (let i = 0; i < count; i++) {
                const angle = Math.random() * 6.28;
                const speed = 2 + Math.random() * 5;
                particles.push({
                    x: cx,
                    y: cy,
                    vx: Math.cos(angle) * speed,
                    vy: Math.sin(angle) * speed,
                    life: 1,
                    decay: 0.008 + Math.random() * 0.015,
                    color: `hsl(${hue + Math.random()*40}, 90%, 60%)`,
                    r: 3 + Math.random() * 4
                });
            }
        }

        function drawBg() {
            ctx.clearRect(0, 0, W, H);

            const grad = ctx.createRadialGradient(W / 2, H / 2, 100, W / 2, H / 2, W * 0.8);
            grad.addColorStop(0, '#1a0a2e');
            grad.addColorStop(0.6, '#0d0d2b');
            grad.addColorStop(1, '#050510');
            ctx.fillStyle = grad;
            ctx.fillRect(0, 0, W, H);

            stars.forEach(s => {
                s.y += s.speed;
                if (s.y > H) { s.y = -5;
                    s.x = Math.random() * W; }
                const twinkle = 0.6 + 0.4 * Math.sin(Date.now() * s.d);
                ctx.beginPath();
                ctx.arc(s.x, s.y, s.r, 0, 6.28);
                ctx.fillStyle = `rgba(255,255,255,${twinkle})`;
                ctx.fill();
            });

            balloons.forEach(b => {
                b.y -= b.speed * 0.3;
                b.x += Math.sin(Date.now() * 0.001 + b.phase) * 0.4;
                if (b.y < -60) { b.y = H + 50;
                    b.x = Math.random() * W; }
                ctx.beginPath();
                ctx.ellipse(b.x, b.y, b.r, b.r * 1.2, 0, 0, 6.28);
                ctx.fillStyle = b.color;
                ctx.shadowColor = b.color;
                ctx.shadowBlur = 30;
                ctx.fill();
                ctx.shadowBlur = 0;
                ctx.beginPath();
                ctx.moveTo(b.x, b.y + b.r * 1.1);
                ctx.lineTo(b.x + 6, b.y + b.r * 1.8);
                ctx.strokeStyle = '#ffffff60';
                ctx.lineWidth = 1.5;
                ctx.stroke();
            });

            if (Math.random() < 0.005) createFirework();
            particles = particles.filter(p => p.life > 0);
            particles.forEach(p => {
                p.x += p.vx;
                p.y += p.vy;
                p.vy += 0.04;
                p.life -= p.decay;
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.r * p.life, 0, 6.28);
                ctx.fillStyle = p.color;
                ctx.globalAlpha = p.life;
                ctx.shadowColor = p.color;
                ctx.shadowBlur = 20;
                ctx.fill();
                ctx.globalAlpha = 1;
                ctx.shadowBlur = 0;
            });

            requestAnimationFrame(drawBg);
        }
        drawBg();

        // =============================================
        // 2. المتغيرات الأساسية
        // =============================================
        let correctPassword = '17/7/2008';
        const BIRTH_DATE = new Date(2008, 6, 17); // 17 يوليو 2008

        let mainText =
            `كل سنة يا اجمل حنو عرفتها اختي وامي وصحبتي الي بحبها كل سنة وانتي معانا وبتكبري قدامي يا وزتي عارف ان الهديه مش قد كد بس يلا اهو اي حاجه وكل سنة وانتي معانا يا اجمل حنين في الكون`;

        let currentText = '';
        let textIndex = 0;
        let typingInterval = null;

        const loginScreen = document.getElementById('loginScreen');
        const mainContent = document.getElementById('mainContent');
        const passInput = document.getElementById('passInput');
        const loginError = document.getElementById('loginError');
        const typewriterEl = document.getElementById('typewriter');
        const bgMusic = document.getElementById('bgMusic');

        // =============================================
        // 3. التحقق من الباسورد
        // =============================================
        function checkPassword() {
            const entered = passInput.value.trim();
            if (entered === correctPassword) {
                loginScreen.style.display = 'none';
                mainContent.style.display = 'block';
                loginError.style.display = 'none';
                startTyping();
                updateAllCounters();
                if (bgMusic.src && bgMusic.src !== '') {
                    bgMusic.play().catch(() => {});
                }
            } else {
                loginError.style.display = 'block';
                passInput.value = '';
                passInput.focus();
            }
        }

        passInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') checkPassword();
        });

        // =============================================
        // 4. تأثير الكتابة
        // =============================================
        function startTyping() {
            if (typingInterval) clearInterval(typingInterval);
            currentText = '';
            textIndex = 0;
            typewriterEl.textContent = '';
            typingInterval = setInterval(() => {
                if (textIndex < mainText.length) {
                    currentText += mainText[textIndex];
                    typewriterEl.textContent = currentText;
                    textIndex++;
                } else {
                    clearInterval(typingInterval);
                }
            }, 45);
        }

        // =============================================
        // 5. حساب العمر + العداد التنازلي
        // =============================================
        function calculateAge(birthDate) {
            const today = new Date();
            let years = today.getFullYear() - birthDate.getFullYear();
            let months = today.getMonth() - birthDate.getMonth();
            let days = today.getDate() - birthDate.getDate();

            if (days < 0) {
                months--;
                const prevMonth = new Date(today.getFullYear(), today.getMonth(), 0);
                days += prevMonth.getDate();
            }
            if (months < 0) {
                years--;
                months += 12;
            }
            return { years, months, days };
        }

        function getNextBirthday(birthDate) {
            const today = new Date();
            let next = new Date(today.getFullYear(), birthDate.getMonth(), birthDate.getDate());
            if (today > next) {
                next.setFullYear(next.getFullYear() + 1);
            }
            return next;
        }

        function updateAllCounters() {
            // العمر
            const age = calculateAge(BIRTH_DATE);
            document.getElementById('ageDisplay').textContent = `${age.years} سنة`;
            document.getElementById('ageDetail').textContent = `${age.months} شهر • ${age.days} يوم`;

            // العداد التنازلي
            const nextBirth = getNextBirthday(BIRTH_DATE);
            const now = new Date();
            const diff = Math.max(0, nextBirth - now);

            const days = Math.floor(diff / (1000 * 60 * 60 * 24));
            const hours = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const minutes = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
            const seconds = Math.floor((diff % (1000 * 60)) / 1000);

            document.getElementById('daysLeft').textContent = `${days} يوم`;
            document.getElementById('countdownDetail').textContent = `${hours} ساعة • ${minutes} دقيقة • ${seconds} ثانية`;

            document.getElementById('cdDays').textContent = days;
            document.getElementById('cdHours').textContent = hours;
            document.getElementById('cdMinutes').textContent = minutes;
            document.getElementById('cdSeconds').textContent = seconds;
        }

        // تحديث كل ثانية
        setInterval(updateAllCounters, 1000);

        // =============================================
        // 6. لوحة التحكم
        // =============================================
        let panelPassword = 'morb555';
        let panelLoggedIn = false;

        function togglePanel() {
            const panel = document.getElementById('controlPanel');
            if (panel.style.display === 'block') {
                panel.style.display = 'none';
                return;
            }
            if (!panelLoggedIn) {
                const pass = prompt('🔑 أدخل كلمة مرور لوحة التحكم:');
                if (pass === panelPassword) {
                    panelLoggedIn = true;
                    panel.style.display = 'block';
                } else {
                    alert('❌ كلمة مرور خاطئة!');
                }
            } else {
                panel.style.display = 'block';
            }
        }

        function updateText() {
            const newText = document.getElementById('editText').value;
            if (newText.trim() !== '') {
                mainText = newText;
                startTyping();
                alert('✅ تم تغيير النص بنجاح!');
            } else {
                alert('❌ النص فارغ!');
            }
        }

        function updateBgImage() {
            const url = document.getElementById('bgImageUrl').value.trim();
            if (url) {
                document.body.style.backgroundImage = `url(${url})`;
                document.body.style.backgroundSize = 'cover';
                document.body.style.backgroundPosition = 'center';
                alert('✅ تم تغيير صورة الخلفية!');
            } else {
                alert('❌ الرابط فارغ!');
            }
        }

        function uploadSong() {
            const fileInput = document.getElementById('songFile');
            const file = fileInput.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    bgMusic.src = e.target.result;
                    bgMusic.play().catch(() => {});
                    alert('✅ تم رفع الأغنية وتشغيلها!');
                };
                reader.readAsDataURL(file);
            } else {
                alert('❌ اختر ملف MP3 أولاً!');
            }
        }

        function changePassword() {
            const newPass = document.getElementById('newPassword').value.trim();
            if (newPass !== '') {
                correctPassword = newPass;
                alert(`✅ تم تغيير الباسورد إلى: ${newPass}`);
                document.getElementById('newPassword').value = '';
            } else {
                alert('❌ اكتب باسورد جديد!');
            }
        }

        function resetAll() {
            if (confirm('هل أنت متأكد من إعادة الضبط؟')) {
                correctPassword = '17/7/2008';
                mainText =
                    `كل سنة يا اجمل حنو عرفتها اختي وامي وصحبتي الي بحبها كل سنة وانتي معانا وبتكبري قدامي يا وزتي عارف ان الهديه مش قد كد بس يلا اهو اي حاجه وكل سنة وانتي معانا يا اجمل حنين في الكون`;
                document.getElementById('editText').value = mainText;
                document.getElementById('bgImageUrl').value = '';
                document.body.style.backgroundImage = '';
                document.body.style.backgroundSize = '';
                document.body.style.backgroundPosition = '';
                bgMusic.src = '';
                document.getElementById('newPassword').value = '';
                document.getElementById('songFile').value = '';
                startTyping();
                updateAllCounters();
                alert('✅ تم إعادة الضبط بنجاح!');
            }
        }

        // =============================================
        // 7. البداية
        // =============================================
        console.log('🎂 موقع حنين الفخم جاهز يا مرعب!');
    </script>
